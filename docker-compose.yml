services:
    pgsql:
        image: "postgres:17-alpine"
        ports:
            - "${FORWARD_DB_PORT:-5433}:5432"
        environment:
            PGPASSWORD: "${DB_PASSWORD:-password}"
            POSTGRES_DB: "${DB_DATABASE}"
            POSTGRES_USER: "${DB_USERNAME}"
            POSTGRES_PASSWORD: "${DB_PASSWORD:-password}"
        volumes:
            - "sail-pgsql:/var/lib/postgresql/data"
        networks:
            - sail
        healthcheck:
            test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
            retries: 3
            timeout: 5s

    redis:
        image: "redis:alpine"
        ports:
            - "${FORWARD_REDIS_PORT:-6379}:6379"
        volumes:
            - "sail-redis:/data"
        networks:
            - sail
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s

    typesense:
        image: "typesense/typesense:27.1"
        ports:
            - "${FORWARD_TYPESENSE_PORT:-8108}:8108"
        environment:
            TYPESENSE_DATA_DIR: "${TYPESENSE_DATA_DIR:-/typesense-data}"
            TYPESENSE_API_KEY: "${TYPESENSE_API_KEY:-xyz}"
            TYPESENSE_ENABLE_CORS: "${TYPESENSE_ENABLE_CORS:-true}"
        volumes:
            - "sail-typesense:/typesense-data"
        networks:
            - sail
        healthcheck:
            test:
                [
                    "CMD",
                    "bash",
                    "-c",
                    'exec 3<>/dev/tcp/localhost/8108 && printf ''GET /health HTTP/1.1\r\nConnection: close\r\n\r\n'' >&3 && head -n1 <&3 | grep ''200'' && exec 3>&-',
                ]
            retries: 5
            timeout: 7s

    minio:
        image: "minio/minio:latest"
        ports:
            - "${FORWARD_MINIO_PORT:-9100}:9000"
            - "${FORWARD_MINIO_CONSOLE_PORT:-9001}:9001"
        environment:
            MINIO_ROOT_USER: sail
            MINIO_ROOT_PASSWORD: password
        volumes:
            - "sail-minio:/data"
        networks:
            - sail
        command: 'minio server /data --console-address ":9001"'
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            retries: 3
            timeout: 5s

    minio-create-buckets:
        image: minio/mc
        depends_on:
            minio:
                condition: service_healthy
        networks:
            - sail
        entrypoint: >
            sh -c "
            sleep 5;
            mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-sail} ${AWS_SECRET_ACCESS_KEY:-password};
            mc mb local/${AWS_BUCKET:-sail} || true;
            mc anonymous set download local/${AWS_BUCKET:-sail} || true;
            "

    memcached:
        image: "memcached:alpine"
        ports:
            - "${FORWARD_MEMCACHED_PORT:-11211}:11211"
        networks:
            - sail

    soketi:
        image: "quay.io/soketi/soketi:latest-16-alpine"
        environment:
            SOKETI_DEBUG: "${SOKETI_DEBUG:-1}"
            SOKETI_METRICS_SERVER_PORT: "9601"
            SOKETI_DEFAULT_APP_ID: "${PUSHER_APP_ID}"
            SOKETI_DEFAULT_APP_KEY: "${PUSHER_APP_KEY}"
            SOKETI_DEFAULT_APP_SECRET: "${PUSHER_APP_SECRET}"
        ports:
            - "${PUSHER_PORT:-6001}:6001"
            - "${PUSHER_METRICS_PORT:-9601}:9601"
        networks:
            - sail

    buggregator:
        image: ghcr.io/buggregator/server:latest
        ports:
            - "${FORWARD_BUGGREGATOR_PORT:-8100}:8000"
            - "${FORWARD_BUGGREGATOR_SMTP_PORT:-9912}:9912"
            - "${FORWARD_BUGGREGATOR_SOCKET_PORT:-9913}:9913"
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    sail-redis:
        driver: local
    sail-typesense:
        driver: local
    sail-minio:
        driver: local
    sail-pgsql:
        driver: local
